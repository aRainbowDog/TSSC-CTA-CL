# dataset
# ACDC
eval_only: false  # 修改：改为false，开启训练

# 数据路径（根据您的实际路径选择）
# data_path_train: "/root/autodl-tmp/hychen/TSSC_stage1_dataset/train"
# data_path_test: "/root/autodl-tmp/hychen/TSSC_stage1_dataset/test"
data_path_train: "/home/hychen/project/CTA/data/TSSC_stage1_dataset/train"
data_path_test: "/home/hychen/project/CTA/data/TSSC_stage1_dataset/test"
pretrained_vae_model_path: "../ckpts/"
# pretrained_vae_model_path: "/home/hychen/.cache/huggingface/hub/models--stabilityai--sd-vae-ft-mse/snapshots/31f26fdeee1355a5c34592e401dd41e45d25a493/"

# save and load
results_dir: "../Results/runs_CurriculumLearning_v5"  # 修改：新版本目录
pretrained: ""
# pretrained: "../Results/runs_mask_Curriculum_v4/checkpoints/best_epoch_train_model.pth"  # 可选：加载预训练权重
resume_from_checkpoint: false
test_ckpt: ""    # latest_epoch_train_model.pth or best_epoch_train_model.pth
test_ckpt_mode: ""

# model config:
gpu_id: "0"
test_gpu_id: "0"
cur_date: CL_3stage_interval_1_2_4  # 修改：标记课程学习版本
model: MVIF-L/2
tar_num_frames: 3  # 核心修改：从12改为9（支持间隔4采样3帧：0,4,8）
image_size: 256
diffusion_steps: 500   # sample_step
learn_sigma: True # important
train_batch_size: 1 # important (如果显存充足可以改为2)
val_batch_size: 1 # important
test_batch_size: 1

# train config:
save_ceph: True # important
learning_rate: 5e-5                  # 保持不变
ckpt_every_iter: 5000
clip_max_norm: 1.0         
start_clip_iter: 500            
max_train_steps: 800000  # 修改：从8000万改为8万（实际训练到40k+即可）
timestep_respacing_train: ""             # Train sampler
timestep_respacing_test: "ddim50"         # Val/Test sampler
val_interval: 1  # 修改：从10改为5，更频繁的验证
global_seed: 3407
num_workers: 8
log_every: 200  # 修改：从600改为200，更频繁的日志
lr_warmup_steps: 0
gradient_accumulation_steps: 32 
num_classes: 1

# low VRAM and speed up training
use_compile: false
mixed_precision: True
enable_xformers_memory_efficient_attention: False
gradient_checkpointing: True

# ========== 新增：课程学习相关参数 ==========
# 阶段划分（训练步数）
curriculum_learning:
  # 阶段切换点
  stage1_steps: 1000
  stage2_steps: 2000
  
  # 每个阶段的帧间距和密集帧数
  stage1_frame_gap: 1
  stage1_dense_frames: 3
  
  stage2_frame_gap: 2
  stage2_dense_frames: 5
  
  stage3_frame_gap: 4
  stage3_dense_frames: 9
  
  # 递归链配置
  recursive_loss_weight: 0.2  # 降低权重减少计算
  recursive_sampling_steps: 5  # 超快速采样（5步DDIM）

  # 新增：验证权重配置
  val_weights:
    stage1:
      interval_1: 1.0
    stage2:
      interval_1: 0.3
      interval_2: 0.7
    stage3:
      interval_1: 0.1
      interval_2: 0.3
      interval_4: 0.6

# 血管mask相关参数（保持原有）
vessel_mask:
  max_weight: 10.0  # 血管区域最大权重（原来是vessel_max_weight）
  base_weight: 1.0  # 非血管区域基础权重
  enable: true      # 是否启用血管mask加权