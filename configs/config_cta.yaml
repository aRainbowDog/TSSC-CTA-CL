# dataset
# ACDC
eval_only: false

# 数据路径（根据您的实际路径选择）
data_path_train: "data/TSSC_stage1_dataset/train"
data_path_test: "data/TSSC_stage1_dataset/test"
pretrained_vae_model_path: "ckpts/"

# save and load
results_dir: "results/runs/curriculum"  # 新版本
pretrained: ""
resume_from_checkpoint: false
test_ckpt: ""
test_ckpt_mode: ""

# model config:
gpu_id: "0"
test_gpu_id: "0"
cur_date: CL_4stage_gap1_2_4_8  # 标记新版本
model: MVIF-L/2
tar_num_frames: 3  # 三元组
image_size: 256
diffusion_steps: 500
learn_sigma: True
triplet_loss_mode: "auto"  # auto | epsilon | x0
train_batch_size: 1
val_batch_size: 1
test_batch_size: 1

# logging
log_level: "INFO"
tracking_backend: "wandb"  # tensorboard | wandb
wandb_project: "TSSC-CTA-CL"
wandb_entity: "mvi-cta"
wandb_mode: "online"  # online | offline | disabled
wandb_run_name: "TSSC-CTA-CL"

# train config:
save_ceph: True
learning_rate: 5e-5
ckpt_every_iter: 5000
clip_max_norm: 1.0
start_clip_iter: 500
max_train_steps: 8000
timestep_respacing_train: ""
timestep_respacing_val: "ddim20"
timestep_respacing_test: "ddim50"
val_interval: 10
global_seed: 3407
num_workers: 8
log_every: 200
lr_warmup_steps: 0
gradient_accumulation_steps: 32
ddp_timeout_minutes: 180
cuda_empty_cache_interval: 100
triplet_eval_batch_size: 4
val_visualization_count: 20
val_visualization_batch_size: 4
num_classes: 1

# low VRAM and speed up training
use_compile: false
mixed_precision: True
gradient_checkpointing: True

# ========== 课程学习（修正后） ==========
curriculum_learning:
  # ========== 阶段0：新增Gap=1（伪GT） ==========
  stage0_steps: 0 # 500
  stage0_frame_gap: 1
  stage0_dense_frames: 2
  stage0_use_pseudo_gt: true
  stage0_alpha_range: [0.3, 0.7]  # α随机范围
  
  # ========== 阶段1：修正Gap=2 ==========
  stage1_steps: 8001 # 1500
  stage1_frame_gap: 2
  stage1_dense_frames: 3
  
  # ========== 阶段2：修正Gap=4 ==========
  stage2_steps: 16000 # 2500
  stage2_frame_gap: 4
  stage2_dense_frames: 5
  
  # ========== 阶段3：修正Gap=8 ==========
  stage3_frame_gap: 8
  stage3_dense_frames: 9
  
  # 递归链配置
  recursive_loss_weight: 0.6
  recursive_sampling_steps: 50
  
  # 验证权重（修正后）
  val_weights:
    stage0:
      interval_1: 1.0
    stage1:
      interval_2: 1.0
    stage2:
      interval_2: 0.3
      interval_4: 0.7
    stage3:
      interval_2: 0.1
      interval_4: 0.3
      interval_8: 0.6

# 血管mask相关参数
vessel_mask:
  max_weight: 10.0
  base_weight: 1.0
  enable: true
